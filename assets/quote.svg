<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blurIn" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8">
        <animate attributeName="stdDeviation" from="8" to="0" dur="1.5s" fill="freeze"/>
      </feGaussianBlur>
    </filter>
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <rect width="800" height="120" fill="#08080d" rx="0"/>
  <rect x="20" y="10" width="760" height="100" rx="14" fill="url(#glassFill)" stroke="url(#border)" stroke-width="1"/>
  <text x="400" y="55" text-anchor="middle" font-size="14" font-style="italic" font-weight="300"
        font-family="'Segoe UI',system-ui,sans-serif" fill="#8b949e" filter="url(#blurIn)" opacity="0" letter-spacing="1">
    "I don't just write code.
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" fill="freeze"/>
  </text>
  <text x="400" y="80" text-anchor="middle" font-size="14" font-style="italic" font-weight="300"
        font-family="'Segoe UI',system-ui,sans-serif" fill="#8b949e" filter="url(#blurIn)" opacity="0" letter-spacing="1">
    I build systems that run businesses."
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" begin="0.3s" fill="freeze"/>
  </text>
  <!-- Subtle glow behind text -->
  <text x="400" y="65" text-anchor="middle" font-size="14" font-style="italic" fill="white" opacity="0" filter="url(#glow)">
    I build systems that run businesses.
    <animate attributeName="opacity" from="0" to="0.06" dur="2s" begin="1s" fill="freeze"/>
  </text>
</svg>
